<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Closet Infantil — Produtividade</title>
<style>
:root{
  --pa:#FAEFDA;--pa2:#F2E4C9;--wh:#FFFFFF;
  --fe:#B5916B;--fe2:#D4B898;--ch:#4A3524;--ch2:#6B4F38;
  --gn:#3B6D11;--gn2:#EAF0E8;--am:#B07D00;--am2:#FEF3C7;
  --rd:#991B1B;--rd2:#FEE2E2;--bl:#1E40AF;--bl2:#DBEAFE;
  --shadow:0 8px 28px rgba(74,53,36,.10);--r:20px;--r-sm:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins','Segoe UI',Arial,sans-serif;background:var(--pa);color:var(--ch);min-height:100vh;padding:0 0 60px}
body::before,body::after{content:"";position:fixed;border-radius:50%;z-index:0;pointer-events:none}
body::before{width:500px;height:500px;background:radial-gradient(circle,var(--fe2) 0%,transparent 65%);top:-180px;right:-160px;opacity:.3}
body::after{width:600px;height:600px;background:radial-gradient(circle,var(--fe2) 0%,transparent 65%);bottom:-260px;left:-220px;opacity:.2}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.btn-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--fe);background:none;border:1.5px solid var(--fe2);border-radius:20px;padding:6px 14px;cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif}
.btn-back:hover{background:var(--fe2)}
h1{font-family:Georgia,serif;font-size:clamp(18px,3vw,24px);color:var(--ch)}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.filtros select{padding:8px 12px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:'Poppins',sans-serif;font-size:13px;color:var(--ch);background:var(--wh)}
.filtros label{font-size:12px;font-weight:600;color:var(--ch2)}
/* Cards de terceirizados */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:28px}
.terc-card{background:var(--wh);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.terc-header{background:var(--ch);color:var(--pa);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.terc-nome{font-weight:700;font-size:15px}
.terc-etapa{font-size:11px;opacity:.7;margin-top:2px}
.kpi-row{display:flex;gap:0;border-bottom:1px solid var(--pa2)}
.kpi{flex:1;padding:14px 16px;text-align:center;border-right:1px solid var(--pa2)}
.kpi:last-child{border-right:none}
.kpi-val{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--ch)}
.kpi-lbl{font-size:10px;color:var(--ch2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.kpi-sub{font-size:10px;color:var(--fe);margin-top:1px}
/* Tabela de lotes */
.lotes-table{width:100%;border-collapse:collapse;font-size:12px}
.lotes-table th{padding:8px 12px;background:var(--pa2);color:var(--ch2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:left}
.lotes-table th.r{text-align:right}
.lotes-table td{padding:8px 12px;border-bottom:1px solid var(--pa2);color:var(--ch)}
.lotes-table td.r{text-align:right;font-weight:600}
.lotes-table tr:last-child td{border-bottom:none}
.trend-up{color:var(--gn)}
.trend-dn{color:var(--rd)}
.trend-eq{color:var(--am)}
.badge-ok{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--gn2);color:var(--gn)}
.badge-am{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--am2);color:var(--am)}
/* Barra de tendência */
.trend-bar{height:4px;background:var(--pa2);border-radius:2px;margin:0 16px 14px;position:relative;overflow:visible}
.trend-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.empty{text-align:center;padding:48px;color:var(--fe);font-style:italic}
/* Sem dados */
.no-data{padding:16px;font-size:12px;color:var(--fe);font-style:italic;text-align:center}
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey:"AIzaSyDtgPZ5sMOEb5ObqhVF-cVyTD6s6ENubKA",
    authDomain:"closet-infantil-hub.firebaseapp.com",
    projectId:"closet-infantil-hub",
    storageBucket:"closet-infantil-hub.firebasestorage.app",
    messagingSenderId:"580715110559",
    appId:"1:580715110559:web:f6751ad3ba3376206442aa"
  };
  const app = initializeApp(firebaseConfig);
  window._auth = getAuth(app);
  window._db   = getFirestore(app);
  window.fsLogout = () => signOut(window._auth).then(()=>window.location.href='login.html');
  window.fsGet = async (key) => {
    const s = await getDoc(doc(window._db,'hub',key));
    if(!s.exists()) return null;
    try{ return JSON.parse(s.data().data); }catch(e){ return null; }
  };
  window.fsListen = (key, cb) => onSnapshot(doc(window._db,'hub',key), s => {
    if(!s.exists()){ cb(null); return; }
    try{ cb(JSON.parse(s.data().data)); }catch(e){ cb(null); }
  });
  onAuthStateChanged(window._auth, user => {
    if(!user){ window.location.href='login.html'; return; }
    window._user = user;
    const el = document.getElementById('user-email');
    if(el) el.textContent = user.email;
    init();
  });
</script>

function loadLocal(key, def) {
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch(e){ return def; }
}

function fmt1(n){ return (parseFloat(n)||0).toFixed(1); }
function fmt0(n){ return Math.round(parseFloat(n)||0); }

function diffDias(d1, d2){
  if(!d1||!d2) return null;
  const a=new Date(d1+'T00:00:00'), b=new Date(d2+'T00:00:00');
  return Math.round((b-a)/(1000*60*60*24));
}

async function init(){
  // Tentar Firebase primeiro, fallback para localStorage
  try{
    const [ordens, tercs] = await Promise.all([
      window.fsGet('ci_ordens_producao'),
      window.fsGet('ci_terceirizados'),
    ]);
    _ordens = ordens || loadLocal('ci_ordens_producao',[]);
    _tercs  = tercs  || loadLocal('ci_terceirizados',[]);
  } catch(e){
    _ordens = loadLocal('ci_ordens_producao',[]);
    _tercs  = loadLocal('ci_terceirizados',[]);
  }
  render();
}

function getLotes(tercNome, etapaFil, diasFil){
  const lotes = [];
  const hoje = new Date();
  const limite = diasFil > 0 ? new Date(hoje - diasFil*24*60*60*1000) : null;

  _ordens.forEach(op => {
    const grade = op.grade||{};
    const tams  = op.grade_tamanhos||[];
    const total = tams.reduce((s,t)=>s+(parseInt(grade[t]||0)),0);

    // Talhação
    const talh = op.talh;
    if(talh && talh.fornecedor && nomeMatch(talh.fornecedor, tercNome)) {
      if(!etapaFil || etapaFil==='talh') {
        const dias = diffDias(talh.data_envio, talh.data_retorno_real);
        const retorno = talh.data_retorno_real ? new Date(talh.data_retorno_real+'T00:00:00') : null;
        if((!limite || !retorno || retorno >= limite) && talh.status) {
          lotes.push({
            cod: op.cod, produto: op.produto, etapa: 'Talhação',
            envio: talh.data_envio, retorno: talh.data_retorno_real,
            dias, total, ppcdia: dias>0 ? Math.round(total/dias) : null,
            status: talh.status
          });
        }
      }
    }

    // Etapas
    (op.etapas||[]).forEach(e => {
      if(!e.fornecedor || !nomeMatch(e.fornecedor, tercNome)) return;
      if(etapaFil && e.id !== etapaFil) return;
      const dias = diffDias(e.data_envio, e.data_retorno_real);
      const retorno = e.data_retorno_real ? new Date(e.data_retorno_real+'T00:00:00') : null;
      if(limite && retorno && retorno < limite) return;
      if(!e.data_envio && !e.data_retorno_real) return;
      lotes.push({
        cod: op.cod, produto: op.produto, etapa: ETAPA_LABELS[e.id]||e.id,
        envio: e.data_envio, retorno: e.data_retorno_real,
        dias, total, ppcdia: dias>0 ? Math.round(total/dias) : null,
        status: e.status
      });
    });
  });

  return lotes.sort((a,b)=>{
    if(!a.retorno) return 1;
    if(!b.retorno) return -1;
    return new Date(b.retorno)-new Date(a.retorno);
  });
}

function nomeMatch(f,n){
  if(!f||!n) return false;
  const a=f.trim().toLowerCase(), b=n.trim().toLowerCase();
  return a===b||a.includes(b)||b.includes(a);
}

function calcKpis(lotes){
  const completos = lotes.filter(l=>l.dias!==null&&l.dias>0);
  if(!completos.length) return null;
  const avgDias = completos.reduce((s,l)=>s+l.dias,0)/completos.length;
  const avgPpcdia = completos.filter(l=>l.ppcdia).reduce((s,l)=>s+l.ppcdia,0)/completos.filter(l=>l.ppcdia).length||0;
  const totalPecas = completos.reduce((s,l)=>s+l.total,0);
  // Tendência: comparar últimos 3 vs anteriores
  const tend = completos.length >= 4 ? (() => {
    const metade = Math.floor(completos.length/2);
    const recentes = completos.slice(0,metade);
    const antigos  = completos.slice(metade);
    const mediaRec = recentes.reduce((s,l)=>s+l.dias,0)/recentes.length;
    const mediaAnt = antigos.reduce((s,l)=>s+l.dias,0)/antigos.length;
    return mediaRec < mediaAnt ? 'melhorando' : mediaRec > mediaAnt ? 'piorando' : 'estável';
  })() : 'insuficiente';
  return { avgDias, avgPpcdia, totalPecas, lotes: completos.length, tend };
}

function fmtData(d){
  if(!d) return '—';
  const [y,m,dia]=d.split('-');
  return `${dia}/${m}/${y}`;
}

function trendIcon(t){
  if(t==='melhorando') return '<span class="trend-up">↑ Melhorando</span>';
  if(t==='piorando')   return '<span class="trend-dn">↓ Piorando</span>';
  if(t==='estável')    return '<span class="trend-eq">→ Estável</span>';
  return '<span style="color:var(--fe)">— Poucos dados</span>';
}

function render(){
  const etapaFil = document.getElementById('fil-etapa').value;
  const diasFil  = parseInt(document.getElementById('fil-periodo').value)||0;

  if(!_tercs.length){
    document.getElementById('grid-wrap').innerHTML = '<div class="empty">Nenhum terceirizado cadastrado.</div>';
    return;
  }

  let html = '<div class="grid">';
  let algum = false;

  _tercs.forEach(t => {
    const lotes = getLotes(t.nome, etapaFil, diasFil);
    if(!lotes.length) return;
    algum = true;

    const kpis = calcKpis(lotes);
    const emAndamento = lotes.filter(l=>!l.retorno||!l.dias);

    // Etapas deste terceirizado
    const etapasSet = [...new Set(lotes.map(l=>l.etapa))].join(', ');

    html += `<div class="terc-card">
      <div class="terc-header">
        <div>
          <div class="terc-nome">${t.nome}</div>
          <div class="terc-etapa">${etapasSet}</div>
        </div>
        ${emAndamento.length ? `<span class="badge-am">${emAndamento.length} em andamento</span>` : ''}
      </div>`;

    if(kpis){
      html += `<div class="kpi-row">
        <div class="kpi">
          <div class="kpi-val">${fmt1(kpis.avgDias)}d</div>
          <div class="kpi-lbl">Leadtime médio</div>
          <div class="kpi-sub">${trendIcon(kpis.tend)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-val">${fmt0(kpis.avgPpcdia)}</div>
          <div class="kpi-lbl">Peças/dia médio</div>
          <div class="kpi-sub">${kpis.lotes} lote(s)</div>
        </div>
        <div class="kpi">
          <div class="kpi-val">${fmt0(kpis.totalPecas).toLocaleString('pt-BR')}</div>
          <div class="kpi-lbl">Total peças</div>
          <div class="kpi-sub">no período</div>
        </div>
      </div>`;
    } else {
      html += `<div class="no-data">Nenhum lote com datas de envio e retorno completas.</div>`;
    }

    // Tabela de lotes
    html += `<div style="overflow-x:auto"><table class="lotes-table">
      <thead><tr>
        <th>Ordem</th><th>Etapa</th><th>Envio</th><th>Retorno</th>
        <th class="r">Dias</th><th class="r">Peças</th><th class="r">Pç/dia</th>
      </tr></thead><tbody>`;

    lotes.slice(0,10).forEach(l => {
      const diasStr = l.dias!==null ? (l.dias===0?'mesmo dia':l.dias+'d') : '—';
      const ppdStr  = l.ppcdia ? l.ppcdia.toLocaleString('pt-BR') : '—';
      const cor     = !l.retorno ? 'color:var(--am)' : l.dias>10 ? 'color:var(--rd)' : l.dias<=5 ? 'color:var(--gn)' : '';
      html += `<tr>
        <td style="font-weight:600;white-space:nowrap;font-size:11px">${l.cod}</td>
        <td style="font-size:11px">${l.etapa}</td>
        <td style="font-size:11px;white-space:nowrap">${fmtData(l.envio)}</td>
        <td style="font-size:11px;white-space:nowrap">${l.retorno?fmtData(l.retorno):'<span style="color:var(--am)">Em andamento</span>'}</td>
        <td class="r" style="${cor}">${diasStr}</td>
        <td class="r">${l.total.toLocaleString('pt-BR')}</td>
        <td class="r">${ppdStr}</td>
      </tr>`;
    });

    if(lotes.length > 10){
      html += `<tr><td colspan="7" style="text-align:center;font-size:11px;color:var(--fe);padding:8px">
        +${lotes.length-10} lote(s) não exibido(s)</td></tr>`;
    }

    html += '</tbody></table></div></div>';
  });

  html += '</div>';

  if(!algum){
    html = '<div class="empty">Nenhum dado encontrado para o filtro selecionado.<br/><small>Verifique se as OPs têm datas de envio e retorno preenchidas.</small></div>';
  }

  document.getElementById('grid-wrap').innerHTML = html;
}
</script>
</body>
</html>
