<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Closet Hub"/>
  <meta name="theme-color" content="#4A3524"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Closet Infantil — Ordem de Produção</title>
<style>
:root{
  --pa:#FAEFDA;--pa2:#F2E4C9;--wh:#FFFFFF;
  --fe:#B5916B;--fe2:#D4B898;--ch:#4A3524;--ch2:#6B4F38;
  --gn:#3B6D11;--gn2:#EAF0E8;
  --am:#B07D00;--am2:#FEF3C7;
  --rd:#991B1B;--rd2:#FEE2E2;
  --bl:#1E40AF;--bl2:#DBEAFE;
  --shadow:0 8px 28px rgba(74,53,36,.10);
  --r:20px;--r-sm:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins','Segoe UI',Arial,sans-serif;background:var(--pa);color:var(--ch);min-height:100vh;padding:0 0 80px;overflow-x:hidden}
body::before,body::after{content:"";position:fixed;border-radius:50%;z-index:0;pointer-events:none}
body::before{width:500px;height:500px;background:radial-gradient(circle,var(--fe2) 0%,transparent 65%);top:-180px;right:-160px;opacity:.3}
body::after{width:600px;height:600px;background:radial-gradient(circle,var(--fe2) 0%,transparent 65%);bottom:-260px;left:-220px;opacity:.2}
.wrap{max-width:1280px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{font-family:'Fraunces',serif;font-size:clamp(18px,3vw,26px);font-weight:600;color:var(--ch)}
.btn-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--fe);background:none;border:1.5px solid var(--fe2);border-radius:20px;padding:6px 14px;cursor:pointer;text-decoration:none;transition:all .15s;font-family:'Poppins',sans-serif}
.btn-back:hover{background:var(--fe2)}
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.painel{background:var(--wh);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;position:sticky;top:20px;max-height:calc(100vh - 100px);overflow-y:auto}
.painel-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--ch);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.badge-count{background:var(--ch);color:var(--pa);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.btn-nova{width:100%;padding:9px;border:2px dashed var(--fe2);border-radius:var(--r-sm);background:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--fe);cursor:pointer;transition:all .15s;margin-bottom:10px}
.btn-nova:hover{background:var(--pa);border-color:var(--fe)}
.ordem-item{padding:10px 12px;border-radius:var(--r-sm);border:1.5px solid var(--fe2);margin-bottom:7px;cursor:pointer;transition:all .15s;background:var(--pa)}
.ordem-item:hover{border-color:var(--fe);transform:translateX(2px)}
.ordem-item.ativa{border-color:var(--ch);background:var(--pa2)}
.ordem-item-ref{font-size:12px;font-weight:600;color:var(--ch);margin-bottom:3px}
.ordem-item-meta{font-size:10px;color:var(--fe);display:flex;gap:6px;flex-wrap:wrap}
.ordem-item-prog{margin-top:6px;height:3px;background:var(--fe2);border-radius:2px;overflow:hidden}
.ordem-item-bar{height:100%;background:var(--gn);border-radius:2px;transition:width .3s}
.empty-state{text-align:center;padding:28px 0;color:var(--fe);font-size:11px;font-style:italic}
.st{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.st-ag{background:var(--fe2);color:var(--ch2)}
.st-em{background:var(--am2);color:var(--am)}
.st-ok{background:var(--gn2);color:var(--gn)}
.form-card{background:var(--wh);border-radius:var(--r);box-shadow:var(--shadow);padding:28px}
.form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.form-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ch)}
.form-actions{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--ch);color:var(--pa)}
.btn-primary:hover{background:var(--ch2)}
.btn-danger{background:var(--rd2);color:var(--rd);border:1.5px solid var(--rd)}
.btn-danger:hover{background:var(--rd);color:#fff}
.btn-ghost{background:none;color:var(--ch2);border:1.5px solid var(--fe2)}
.btn-ghost:hover{background:var(--pa)}
.btn-print{background:var(--bl2);color:var(--bl);border:1.5px solid var(--bl)}
.btn-print:hover{background:var(--bl);color:#fff}
.section{margin-bottom:24px}
.section-label{font-size:10px;font-weight:700;color:var(--fe);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--fe2)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:500;color:var(--ch2)}
.field input,.field select,.field textarea{padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:'Poppins',sans-serif;font-size:12px;color:var(--ch);background:var(--wh);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--fe)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cols-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cols-4{display:flex;gap:10px}
.cols-4 .field{flex:1;margin-bottom:0}
@media(max-width:600px){.cols,.cols-3{grid-template-columns:1fr}.cols-4{flex-wrap:wrap}.cols-4 .field{min-width:calc(50% - 10px)}}
.lote-badge{display:inline-flex;align-items:center;gap:8px;background:var(--pa2);border:1.5px solid var(--fe2);border-radius:var(--r-sm);padding:8px 14px;font-size:13px;font-weight:700;color:var(--ch);font-family:'Fraunces',serif;letter-spacing:1px}
.prog-bar-wrap{background:var(--pa2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:18px}
.prog-label{font-size:10px;color:var(--ch2);font-weight:500;margin-bottom:5px;display:flex;justify-content:space-between}
.prog-track{height:7px;background:var(--fe2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--gn);border-radius:4px;transition:width .4s}
.etapa-card{border:1.5px solid var(--fe2);border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.etapa-card.st-ok-border{border-color:var(--gn)}
.etapa-card.inativa{opacity:.45;filter:grayscale(.6)}
.etapa-card.inativa .etapa-header{background:var(--pa2)}
.ativa-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 10px;border-radius:20px;border:1.5px solid var(--fe2);background:var(--wh);font-size:10px;font-weight:600;color:var(--fe2);transition:all .15s;flex-shrink:0;user-select:none}
.ativa-toggle.on{border-color:var(--gn);background:var(--gn2);color:var(--gn)}
.etapa-card.st-em-border{border-color:var(--am)}
.etapa-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--pa);transition:background .15s;user-select:none}
.etapa-header:hover{background:var(--pa2)}
.etapa-num{width:24px;height:24px;border-radius:50%;background:var(--ch);color:var(--pa);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.etapa-nome{font-size:12px;font-weight:600;color:var(--ch);flex:1}
.etapa-chevron{font-size:11px;color:var(--fe);transition:transform .2s}
.etapa-chevron.open{transform:rotate(180deg)}
.print-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:20px;border:1.5px solid var(--fe2);background:var(--wh);font-size:10px;font-weight:600;color:var(--fe2);transition:all .15s;flex-shrink:0;user-select:none}
.print-toggle.on{border-color:var(--gn);background:var(--gn2);color:var(--gn)}
.print-toggle .pt-icon{font-size:13px}
.etapa-body{padding:14px;border-top:1px solid var(--fe2);display:none;background:var(--wh)}
.etapa-body.open{display:block}
.status-row{display:flex;gap:6px;margin-bottom:12px}
.st-btn{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--fe2);font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;cursor:pointer;background:none;color:var(--ch2);transition:all .15s;text-align:center}
.st-btn.on-ag{background:var(--fe2);border-color:var(--fe);color:var(--ch)}
.st-btn.on-em{background:var(--am2);border-color:var(--am);color:var(--am)}
.st-btn.on-ok{background:var(--gn2);border-color:var(--gn);color:var(--gn)}
.datas-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:500px){.datas-row{grid-template-columns:1fr}}
/* Tabelas de checklist */
.ck-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}
.ck-table th{padding:6px 8px;background:var(--pa2);color:var(--ch2);font-weight:600;text-align:center;border:1px solid var(--fe2);font-size:10px;white-space:nowrap}
.ck-table th.th-tam{text-align:left;min-width:50px}
.ck-table th.th-ref{background:var(--pa2);font-size:10px}
.ck-table th.th-check{background:#DBEAFE;color:#1E40AF}
.ck-table th.th-ret{background:#FEF3C7;color:#B07D00}
.ck-table th.th-body{background:#EAF0E8;color:#3B6D11}
.ck-table th.th-short{background:#EDE9FE;color:#5B21B6}
.ck-table th.th-emb{background:#DBEAFE;color:#1E40AF}
.ck-table th.th-fuchi{background:#FEF3C7;color:#B07D00}
.ck-table th.th-2q{background:#FEE2E2;color:#991B1B}
.ck-table th.th-sobra{background:#F3E8FF;color:#6B21A8}
.ck-table td{padding:7px 8px;border:1px solid var(--fe2);text-align:center;font-weight:500;color:var(--ch)}
.ck-table td.td-tam{text-align:left;font-weight:700;background:var(--pa)}
.ck-table td.td-total{background:var(--pa2);font-weight:700}
.ck-table td input{width:64px;padding:7px 4px;border:1.5px solid var(--fe2);border-radius:7px;text-align:center;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--ch);background:var(--wh)}
.ck-total-row td{background:var(--pa2);font-weight:700;font-size:11px}
.field textarea{resize:vertical;min-height:60px}
footer{text-align:center;margin-top:40px;font-size:11px;color:var(--fe);font-family:'Fraunces',serif;font-style:italic}
#print-sheet{display:none}

@media print{

  .wrap,.layout,.painel,.form-card,header,footer{display:none!important}

    background:#fff;box-sizing:border-box;
  }
  .pr-header{display:flex;align-items:center;justify-content:space-between;border-bottom:2.5px solid #4A3524;padding-bottom:9px;margin-bottom:10px}
  .pr-logo img{height:40px;width:auto}
  .pr-title{font-family:'Fraunces',serif;font-size:16pt;font-weight:600;color:#4A3524;line-height:1;text-align:right}
  .pr-sub{font-size:7pt;color:#6B4F38;margin-top:2px;text-align:right}
  .pr-id-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
  .pr-id-cell{border:1px solid #D4B898;border-radius:5px;padding:5px 8px}
  .pr-id-label{font-size:6.5pt;font-weight:700;color:#B5916B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
  .pr-id-val{font-size:9.5pt;font-weight:700;color:#4A3524}
  .pr-section{margin-top:10px;margin-bottom:6px}
  .pr-section-title{font-size:7pt;font-weight:700;color:#B5916B;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #D4B898;padding-bottom:3px;margin-bottom:6px}
  .pr-etapa{border:1.5px solid #D4B898;border-radius:7px;padding:8px 10px;margin-bottom:8px;break-inside:avoid}

  .pr-etapa-num{width:18px;height:18px;background:#4A3524;color:#FAEFDA;border-radius:50%;font-size:7.5pt;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pr-etapa-nome{font-size:10pt;font-weight:700;color:#4A3524;flex:1}
  .pr-status-box{display:inline-flex;align-items:center;gap:10px;border:1px solid #D4B898;border-radius:5px;padding:3px 8px;margin-bottom:6px}
  .pr-st-opt{display:flex;align-items:center;gap:3px;font-size:7.5pt;color:#4A3524}
  .pr-st-box{width:10px;height:10px;border:1.5px solid #4A3524;border-radius:2px;flex-shrink:0}
  .pr-datas{display:table;width:100%;border-spacing:4px 0;border-collapse:separate;margin-bottom:6px}
  .pr-datas>div{display:table-cell;vertical-align:bottom;width:20%}
  .pr-field-label{font-size:6.5pt;font-weight:700;color:#B5916B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .pr-field-val{border-bottom:1px solid #D4B898;padding:2px 0;font-size:8pt;color:#1a1a1a;min-height:16px}
  .pr-ck-table{width:100%;border-collapse:collapse;font-size:8pt;margin-top:6px}
  .pr-ck-table th{padding:4px 6px;background:#F2E4C9;color:#4A3524;font-weight:700;text-align:center;border:1px solid #D4B898;font-size:7.5pt;white-space:nowrap}
  .pr-ck-table th.th-tam{text-align:left}
  .pr-ck-table th.th-check{background:#DBEAFE;color:#1E40AF}
  .pr-ck-table th.th-ret{background:#FEF3C7;color:#B07D00}
  .pr-ck-table th.th-body{background:#EAF0E8;color:#3B6D11}
  .pr-ck-table th.th-short{background:#EDE9FE;color:#5B21B6}
  .pr-ck-table th.th-emb{background:#DBEAFE;color:#1E40AF}
  .pr-ck-table th.th-fuchi{background:#FEF3C7;color:#B07D00}
  .pr-ck-table th.th-2q{background:#FEE2E2;color:#991B1B}
  .pr-ck-table th.th-sobra{background:#F3E8FF;color:#6B21A8}
  .pr-ck-table td{padding:4px 6px;border:1px solid #D4B898;text-align:center;min-width:40px;height:16px}
  .pr-ck-table td.td-tam{text-align:left;font-weight:700;background:#FAEFDA}
  .pr-ck-table .total-row td{background:#F2E4C9;font-weight:700}
  .pr-obs-area{border:1px solid #D4B898;border-radius:5px;padding:5px 8px;min-height:28px;margin-top:4px;font-size:8pt}
  .pr-footer{margin-top:12px;border-top:1px solid #D4B898;padding-top:6px;display:flex;justify-content:space-between;align-items:flex-end;font-size:6.5pt;color:#B5916B}
  .pr-assinatura{display:flex;gap:20px}
  .pr-assin-item{text-align:center}
  .pr-assin-line{width:100px;border-bottom:1px solid #4A3524;margin-bottom:3px;height:18px}
}

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDtgPZ5sMOEb5ObqhVF-cVyTD6s6ENubKA",
      authDomain: "closet-infantil-hub.firebaseapp.com",
      projectId: "closet-infantil-hub",
      storageBucket: "closet-infantil-hub.firebasestorage.app",
      messagingSenderId: "580715110559",
      appId: "1:580715110559:web:f6751ad3ba3376206442aa"
    };
    const app = initializeApp(firebaseConfig);
    window._auth = getAuth(app);
    window._db   = getFirestore(app);
    window.fsSet = async (key, value) => {
      await setDoc(doc(window._db,'hub',key),{data:JSON.stringify(value)});
    };
    window.fsGet = async (key) => {
      const s = await getDoc(doc(window._db,'hub',key));
      if(!s.exists()) return null;
      try{ return JSON.parse(s.data().data); }catch(e){ return null; }
    };
    window.fsListen = (key, cb) => {
      return onSnapshot(doc(window._db,'hub',key), s => {
        if(!s.exists()){ cb(null); return; }
        try{ cb(JSON.parse(s.data().data)); }catch(e){ cb(null); }
      });
    };
    window.fsLogout = () => signOut(window._auth).then(()=>window.location.href='login.html');
    onAuthStateChanged(window._auth, user => {
      if(!user){ window.location.href='login.html'; return; }
      window._user = user;
      const el = document.getElementById('user-email');
      if(el) el.textContent = user.email;
      if(typeof window._onFirebaseReady === 'function') window._onFirebaseReady();
    });
  </script>
  <script>
    // Fix iOS PWA — inputs não abriam teclado em modo standalone
    document.addEventListener('touchend', function(e){
      const el = e.target;
      if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'){
        e.preventDefault();
        el.focus();
        if(el.tagName!=='SELECT') el.click();
      }
    }, {passive:false});
  </script>

<div class="wrap">
  <header>

<script>
// ── FIREBASE SYNC LAYER ──────────────────────────────────────────────────────
const _fsKeys = ['ci_ordens_producao','ci_lote_seq','ci_terceirizados',
  'ci_fechamentos','ci_custo_historico','ci_base_produtos','closet_friso_v3'];

// Fila de pendências — guarda o que precisa ser enviado ao Firebase
const _fsPendentes = {};

function _lsGet(key, def) {
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch(e){ return def; }
}
function _lsSet(key, value) {
  // 1. Salvar localStorage imediatamente
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){ console.error('localStorage error:',e); }
  // 2. Tentar enviar ao Firebase
  if(_fsKeys.includes(key)){
    try{
      const safe = JSON.parse(JSON.stringify(value));
      if(window.fsSet){
        // Firebase disponível — enviar agora
        window.fsSet(key, safe).catch(e=>{
          console.warn('FS sync falhou, guardando na fila:',key);
          _fsPendentes[key] = safe;
        });
      } else {
        // Firebase ainda não inicializou — guardar na fila
        _fsPendentes[key] = safe;
      }
    }catch(e){ console.warn('FS serialize error:',key,e.message); }
  }
}

window._onFirebaseReady = function() {
  if(window._fsInitDone) return;
  window._fsInitDone = true;

  // Enviar tudo que ficou na fila enquanto Firebase não estava pronto
  const pendentes = Object.keys(_fsPendentes);
  if(pendentes.length > 0){
    console.log('Enviando', pendentes.length, 'itens pendentes ao Firebase...');
    pendentes.forEach(key => {
      window.fsSet(key, _fsPendentes[key])
        .then(()=>{ delete _fsPendentes[key]; })
        .catch(e=>console.warn('Erro ao enviar pendente:',key,e.message));
    });
  }

  // Escutar mudanças em tempo real
  _fsKeys.forEach(key => {
    window.fsListen(key, value => {
      if(value === null) return;
      try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
      if(typeof window._onDataUpdate === 'function') window._onDataUpdate(key);
    });
  });
};
// ─────────────────────────────────────────────────────────────────────────────

const OP_KEY  = 'ci_ordens_producao';
const SEQ_KEY = 'ci_lote_seq';

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadOrdens(){ try{ return _lsGet(OP_KEY, []) }catch(e){ return [] } }
function saveOrdens(o){ try{ _lsSet(OP_KEY, o) }catch(e){} }
function nextSeq(){
  let n = 1;
  try{ n = parseInt(_lsGet(SEQ_KEY, null)||'0') + 1; localStorage.setItem(SEQ_KEY, String(n)); }catch(e){ n = (Date.now()%9999)+1; }
  const ano = new Date().getFullYear().toString().slice(2);
  return 'CI-'+ano+'-'+String(n).padStart(4,'0');
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let ordens = loadOrdens();
let ordemAtiva = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function fmtData(d){ return d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '' }
function statusClass(s){ return s==='concluido'?'st-ok':s==='em_producao'?'st-em':'st-ag' }
function statusLabel(s){ return s==='concluido'?'Concluído':s==='em_producao'?'Em produção':'Aguardando' }
function progresso(ordem){
  const ativas = ordem.etapas.filter(e=>e.ativa);
  if(!ativas.length) return 0;
  const ok = ativas.filter(e=>e.status==='concluido').length;
  return Math.round(ok/ativas.length*100);
}
function totalGrade(grade){
  return Object.values(grade||{}).reduce((s,v)=>s+(parseInt(v)||0),0);
}
function ehConjunto(o){ return (o.tipo_peca||'conjunto')==='conjunto'; }
function ehRomper(o){ return o.tipo_peca==='romper'; }
function ehSuperior(o){ return o.tipo_peca==='body'||o.tipo_peca==='romper'||o.tipo_peca==='ciclista'; }
function ehInferior(o){ return o.tipo_peca==='calca'||o.tipo_peca==='bermuda'; }

// ── NOVA ORDEM ────────────────────────────────────────────────────────────────
function novaOrdem(){
  const cod = nextSeq();
  const ordem = {
    id: genId(), cod,
    produto: '',
    data_criacao: new Date().toISOString().slice(0,10),
    tipo_peca: 'conjunto',
    grade_tamanhos: ['RN','P','M','G','GG'],
    grade: {RN:0,P:0,M:0,G:0,GG:0},
    etapas: [
      { id:'est1', nome:'Estamparia Nuca', tipo:'estamparia', fornecedor:'', status:'aguardando', data_envio:'', data_retorno_prev:'', data_retorno_real:'', obs:'', ck:{}, ativa:false, imprimir:false },
      { id:'est2', nome:'Estamparia Frente', tipo:'estamparia', fornecedor:'', status:'aguardando', data_envio:'', data_retorno_prev:'', data_retorno_real:'', obs:'', ck:{}, ativa:false, imprimir:false },

}

function salvarTalh(campo, val){
  if(ordemAtiva===null) return;

  ordens[ordemAtiva].talh[campo] = val;

}
function salvarEtapa(ei, campo, val){
  if(ordemAtiva===null) return;

  saveOrdens(ordens); renderLista(); atualizarProgForm(); atualizarBordaEtapa(ei);
}
function salvarCk(ei, chave, val){

function atualizarProgForm(){

function atualizarGrade(tamanhoStr){
  if(ordemAtiva===null) return;
  const tams = tamanhoStr.trim().toUpperCase().split(/[\s,;]+/).filter(Boolean);
  if(!tams.length) return;
  const antiga = ordens[ordemAtiva].grade||{};
  const nova = {}; tams.forEach(t => nova[t]=antiga[t]||0);
  ordens[ordemAtiva].grade_tamanhos = tams;
  ordens[ordemAtiva].grade = nova;
  saveOrdens(ordens);
  // Re-renderizar o formulário completo para que os checklists usem a nova grade
  renderForm();
}

// ── TOTALIZADOR CHECKLIST ─────────────────────────────────────────────────────
function atualizarTotalCk(ei){
  const o = ordens[ordemAtiva];
  const e = o.etapas[ei];
  const tams = o.grade_tamanhos||[];
  const tipo = e.tipo;
  const conjunto = ehConjunto(o)
    || !!(o.op_vinculada && ordens.find(x=>x.cod===o.op_vinculada && (x.tipo_peca==='body'||x.tipo_peca==='superior')))
    || !!(ordens.find(x=>x.op_vinculada===o.cod && (x.tipo_peca==='calca'||x.tipo_peca==='bermuda')));
  const ck = e.ck||{};

  if(tipo==='estamparia'){
    let totEst=0, totRet=0;
    tams.forEach(t => { totEst += ck[`est_${t}`]||0; totRet += ck[`ret_${t}`]||0; });
    const rowEst = document.getElementById(`ck-total-est-${ei}`);
    const rowRet = document.getElementById(`ck-total-ret-${ei}`);
    if(rowEst) rowEst.textContent = totEst||'';
    if(rowRet) rowRet.textContent = totRet||'';
  } else if(tipo==='costura'){
    const tipoPeca = o.tipo_peca||'conjunto';
    let totBody=0, totShort=0;
    tams.forEach(t => { totBody+=ck[`body_${t}`]||0; totShort+=ck[`short_${t}`]||0; });
    const rb=document.getElementById(`ck-total-body-${ei}`); if(rb) rb.textContent=totBody||'';
    const rs=document.getElementById(`ck-total-short-${ei}`); if(rs) rs.textContent=totShort||'';
    // Calcular conjuntos e sobras por tamanho para conjunto
    if(tipoPeca==='conjunto'){
      let totCj=0, totSbB=0, totSbS=0;
      tams.forEach(t => {
        const b = parseInt(ck[`body_${t}`])||0;
        const s = parseInt(ck[`short_${t}`])||0;
        const cj = Math.min(b,s);
        const sbB = b-cj; const sbS = s-cj;
        totCj+=cj; totSbB+=sbB; totSbS+=sbS;
        const rcj=document.getElementById(`ck-conj-${ei}-${t}`); if(rcj){rcj.textContent=cj||''; rcj.style.background=cj?'var(--gn2)':''; rcj.style.fontWeight=cj?'700':'';}
        const rsb=document.getElementById(`ck-sbb-${ei}-${t}`); if(rsb){rsb.textContent=sbB||''; rsb.style.color=sbB?'var(--am)':'';}
        const rss=document.getElementById(`ck-sbs-${ei}-${t}`); if(rss){rss.textContent=sbS||''; rss.style.color=sbS?'var(--am)':'';}
      });
      const rcj=document.getElementById(`ck-total-conj-${ei}`); if(rcj) rcj.textContent=totCj||'';
      const rsb=document.getElementById(`ck-total-sbb-${ei}`); if(rsb) rsb.textContent=totSbB||'';
      const rss=document.getElementById(`ck-total-sbs-${ei}`); if(rss) rss.textContent=totSbS||'';
    }
  } else if(tipo==='botao'){
    let totScos=0, totBotb=0;
    tams.forEach(t => { totScos+=ck[`scos_${t}`]||0; totBotb+=ck[`botb_${t}`]||0; });
    const rsc=document.getElementById(`ck-total-scos-${ei}`); if(rsc) rsc.textContent=totScos||'';
    const rb=document.getElementById(`ck-total-botb-${ei}`); if(rb) rb.textContent=totBotb||'';
  } else if(tipo==='conferencia'){
    const conj = ehConjunto(ordens[ordemAtiva]);
    if(conj){
      let tBody=0, tCal=0;
      tams.forEach(t => { tBody+=ck[`conf_body_${t}`]||0; tCal+=ck[`conf_cal_${t}`]||0; });
      const rb=document.getElementById(`ck-total-confbody-${ei}`); if(rb) rb.textContent=tBody||'';
      const rc=document.getElementById(`ck-total-confcal-${ei}`); if(rc) rc.textContent=tCal||'';
    } else {
      let tConf=0;
      tams.forEach(t => { tConf+=ck[`conf_${t}`]||0; });
      const rc=document.getElementById(`ck-total-conf-${ei}`); if(rc) rc.textContent=tConf||'';
    }
  } else if(tipo==='revisao'){
    let tScos=0, tScosB=0;
    tams.forEach(t => { tScos+=parseInt(ck[`scos_${t}`])||0; tScosB+=parseInt(ck[`scosb_${t}`])||0; });
    const rsc=document.getElementById(`ck-total-scos-${ei}`); if(rsc) rsc.textContent=tScos||'';
    const rscb=document.getElementById(`ck-total-scosb-${ei}`); if(rscb) rscb.textContent=tScosB||'';
    if(conjunto){
      let tEmb=0,tFuchi=0,tFuchiB=0,tFConj=0,t2q=0,t2qB=0,tSobra=0,tSobraB=0;
      tams.forEach(t => {
        tEmb+=parseInt(ck[`emb_${t}`])||0;
        const fb=parseInt(ck[`fuchi_${t}`])||0;
        const fc=parseInt(ck[`fuchib_${t}`])||0;
        tFuchi+=fb; tFuchiB+=fc;
        t2q+=parseInt(ck[`dq_${t}`])||0; t2qB+=parseInt(ck[`dqb_${t}`])||0;
        tSobra+=parseInt(ck[`sob_${t}`])||0; tSobraB+=parseInt(ck[`sobb_${t}`])||0;
        // Atualizar célula fconj por tamanho
      });
      [['emb',tEmb],['fuchi',tFuchi],['fuchib',tFuchiB],
       ['dq',t2q],['dqb',t2qB],['sobra',tSobra],['sobrab',tSobraB]].forEach(([k,v]) => {
        const el=document.getElementById(`ck-total-${k}-${ei}`); if(el) el.textContent=v||'';
      });
    } else {
      let tEmb=0,tFuchi=0,t2q=0,tSobra=0;
      tams.forEach(t => { tEmb+=parseInt(ck[`emb_${t}`])||0; tFuchi+=parseInt(ck[`fuchi_${t}`])||0; t2q+=parseInt(ck[`dq_${t}`])||0; tSobra+=parseInt(ck[`sob_${t}`])||0; });
      [['emb',tEmb],['fuchi',tFuchi],['dq',t2q],['sobra',tSobra]].forEach(([k,v]) => {
        const el=document.getElementById(`ck-total-${k}-${ei}`); if(el) el.textContent=v||'';
      });
    }
  }
}

function renderCkCostura(ei){
  const o = ordens[ordemAtiva];
  const tams = o.grade_tamanhos||[];
  const ck = o.etapas[ei].ck||{};
  const tipo = o.tipo_peca||'conjunto';
  const conj   = tipo==='conjunto';
  const romper = tipo==='romper';
  const sup    = tipo==='body'||tipo==='romper'||tipo==='ciclista';
  const inf    = tipo==='calca'||tipo==='bermuda';

  const refTam = t => o.grade[t]||0;
  const totalRef = tams.reduce((s,t)=>s+refTam(t),0);

  const rows = tams.map(t => {
    const ref = `<td class="td-total ck-cell-cortado-${t}" title="Cortado">${refTam(t)}</td>`;
    if(conj){
      const b = parseInt(ck[`body_${t}`])||0;
      const s2 = parseInt(ck[`short_${t}`])||0;
      const cj = Math.min(b,s2);
      const sbB = b-cj; const sbS = s2-cj;
      const conjCell = b||s2 ? `<td class="td-total" id="ck-conj-${ei}-${t}" style="background:var(--gn2);font-weight:700">${cj||''}</td><td class="td-total" id="ck-sbb-${ei}-${t}" style="color:var(--am);font-weight:600">${sbB||''}</td><td class="td-total" id="ck-sbs-${ei}-${t}" style="color:var(--am);font-weight:600">${sbS||''}</td>` : `<td id="ck-conj-${ei}-${t}"></td><td id="ck-sbb-${ei}-${t}"></td><td id="ck-sbs-${ei}-${t}"></td>`;
      return `<tr>
        <td class="td-tam">${t}</td>${ref}
        <td><input type="number" min="0" value="${ck[`body_${t}`]||''}" oninput="salvarCk(${ei},'body_${t}',this.value);atualizarTotalCk(${ei})"/></td>
        <td><input type="number" min="0" value="${ck[`short_${t}`]||''}" oninput="salvarCk(${ei},'short_${t}',this.value);atualizarTotalCk(${ei})"/></td>
        ${conjCell}
      </tr>`;
    }
    if(sup) return `<tr>
      <td class="td-tam">${t}</td>${ref}
      <td><input type="number" min="0" value="${ck[`body_${t}`]||''}" oninput="salvarCk(${ei},'body_${t}',this.value);atualizarTotalCk(${ei})"/></td>
    </tr>`;
    return `<tr>
      <td class="td-tam">${t}</td>${ref}
      <td><input type="number" min="0" value="${ck[`short_${t}`]||''}" oninput="salvarCk(${ei},'short_${t}',this.value);atualizarTotalCk(${ei})"/></td>
    </tr>`;
  }).join('');

  // Totais conjunto: conjuntos, sobra body, sobra calça
  const totB = tams.reduce((s,t)=>s+(parseInt(ck[`body_${t}`])||0),0);
  const totS = tams.reduce((s,t)=>s+(parseInt(ck[`short_${t}`])||0),0);
  const totCj = tams.reduce((s,t)=>s+Math.min(parseInt(ck[`body_${t}`])||0,parseInt(ck[`short_${t}`])||0),0);

// ── TOGGLE IMPRIMIR ETAPA ────────────────────────────────────────────────────
function toggleAtiva(ei, ev){
  ev.stopPropagation();
  if(ordemAtiva===null) return;
  const e = ordens[ordemAtiva].etapas[ei];
  e.ativa = !e.ativa;
  // Se ativando, também marcar para imprimir; se desativando, desmarcar impressão
  if(e.ativa) e.imprimir = true;
  else e.imprimir = false;
  saveOrdens(ordens);
  // Re-renderizar a etapa completa
  const card = document.getElementById('etapa-card-'+ei);
  if(card) card.classList.toggle('inativa', !e.ativa);
  const btn = document.getElementById('ativa-btn-'+ei);
  if(btn){
    btn.className = 'ativa-toggle' + (e.ativa?' on':'');
    btn.innerHTML = e.ativa ? '✓ Ativa' : '○ Inativa';
  }
  // Atualizar toggle de impressão também
  const ptBtn = document.getElementById('pt-btn-'+ei);
  if(ptBtn){
    ptBtn.className = 'print-toggle' + (e.imprimir?' on':'');
    ptBtn.innerHTML = (e.imprimir?'<span class="pt-icon">🖨</span>Imprimir':'<span class="pt-icon">🚫</span>Não imprimir');
  }
  renderLista();
}

function toggleImprimir(ei, ev){
  ev.stopPropagation();
  if(ordemAtiva===null) return;
  const e = ordens[ordemAtiva].etapas[ei];
  e.imprimir = !e.imprimir;
  saveOrdens(ordens);
  const btn = document.getElementById(`pt-btn-${ei}`);
  if(btn){
    btn.className = 'print-toggle' + (e.imprimir ? ' on' : '');
    btn.innerHTML = `<span class="pt-icon">${e.imprimir ? '🖨' : '🚫'}</span>${e.imprimir ? 'Imprimir' : 'Não imprimir'}`;
  }
}

// ── FILTRO DE STATUS ──────────────────────────────────────────────────────────
function getFiltroStatus(){
  const el = document.getElementById('filtro-status');
  return el ? el.value : 'abertas';
}
// ─────────────────────────────────────────────────────────────────────────────

function renderLista(){
  const el = document.getElementById('lista-ordens');
  const filtro = getFiltroStatus();
  const busca = (document.getElementById('busca-op')?.value||'').toLowerCase();
  
  // Badge mostra sempre abertas
  document.getElementById('badge-count').textContent = ordens.filter(o=>!o.concluida).length;
  
  if(!ordens.length){ el.innerHTML='<div class="empty-state">Nenhuma ordem.<br>Clique em "+ Nova ordem".</div>'; return; }
  
  let lista = ordens.map((o,i)=>({...o,_i:i}));
  
  // Filtrar por status
  if(filtro==='abertas')    lista = lista.filter(o=>!o.concluida);
  if(filtro==='concluidas') lista = lista.filter(o=>o.concluida);
  
  // Filtrar por busca
  if(busca) lista = lista.filter(o=>
    (o.produto||'').toLowerCase().includes(busca) ||
    (o.cod||'').toLowerCase().includes(busca)
  );
  
  if(!lista.length){
    el.innerHTML=`<div class="empty-state">Nenhuma ordem ${filtro==='concluidas'?'concluída':filtro==='abertas'?'aberta':''} encontrada.</div>`;
    return;
  }
  
  el.innerHTML = lista.map(o => {
    const prog = progresso(o);
    const total = totalGrade(o.grade);
    return `<div class="ordem-item${o._i===ordemAtiva?' ativa':''}" onclick="selecionarOrdem(${o._i})">
      <div class="ordem-item-ref">
        <span style="font-size:9px;font-weight:400;color:var(--fe);margin-right:5px">${o.cod||''}</span>
        ${o.produto||'<em style="opacity:.5;font-size:11px">Sem produto</em>'}
        ${o.concluida?'<span class="st st-ok">✓</span>':''}
      </div>
      <div class="ordem-item-meta"><span>${total} pç</span><span>${(o.grade_tamanhos||[]).join(' ')}</span><span>${prog}%</span></div>
      <div class="ordem-item-prog"><div class="ordem-item-bar" style="width:${prog}%"></div></div>
    </div>`;
  }).join('');
}

// ── TOGGLE ETAPA ──────────────────────────────────────────────────────────────
function toggleEtapa(ei){
  const body = document.getElementById('etapa-body-'+ei);
  const chev = document.getElementById('chev-'+ei);
  if(!body) return;
  const aberto = body.classList.toggle('open');
  if(chev) chev.classList.toggle('open', aberto);
}

// ── IMPRIMIR ──────────────────────────────────────────────────────────────────
function imprimirOrdem(){
  if(ordemAtiva===null) return;
  // Coletar valores atuais dos inputs da grade diretamente do DOM
  const gradeInputs = document.querySelectorAll('[id^="gq-"]');
  gradeInputs.forEach(inp => {
    const tam = inp.id.replace('gq-','');
    if(ordens[ordemAtiva] && ordens[ordemAtiva].grade) {
      ordens[ordemAtiva].grade[tam] = parseInt(inp.value)||0;
    }
  });
  // Expandir todas as etapas temporariamente para garantir que os inputs estejam acessíveis
  const etapaBodies = document.querySelectorAll('.etapa-body');
  const estadosAbertos = [];
  etapaBodies.forEach((b,i) => {
    estadosAbertos.push(b.classList.contains('open'));
    b.style.display = 'block'; // forçar visível sem alterar a classe
  });
  // Ler todos os inputs de checklist do DOM e salvar no objeto antes de imprimir
  document.querySelectorAll('.ck-table input[type="number"]').forEach(inp => {
    const attr = inp.getAttribute('oninput')||'';
    const m = attr.match(/salvarCk\((\d+),'([^']+)'/);
    if(m){
      const ei = parseInt(m[1]);
      const chave = m[2];
      const val = parseInt(inp.value)||0;
      if(ordens[ordemAtiva] && ordens[ordemAtiva].etapas[ei]){
        if(!ordens[ordemAtiva].etapas[ei].ck) ordens[ordemAtiva].etapas[ei].ck = {};
        ordens[ordemAtiva].etapas[ei].ck[chave] = val;
      }
    }
  });
  // Restaurar estado visual das etapas
  etapaBodies.forEach((b,i) => {
    b.style.display = estadosAbertos[i] ? 'block' : '';
  });
  saveOrdens(ordens);
  // Recarregar para garantir dados frescos
  ordens = loadOrdens();
  const o = ordens[ordemAtiva];
  const tams = o.grade_tamanhos||[];
  const total = totalGrade(o.grade);
  const hoje = new Date().toLocaleDateString('pt-BR');
  const conj = ehConjunto(o);
  const tipoPecaLabel = {conjunto:'Conjunto',body:'Body',calca:'Calça',bermuda:'Bermudinha',romper:'Romper',ciclista:'Ciclista'}[o.tipo_peca]||o.tipo_peca||'—';

  function stBox(e, s){ return `<div class="pr-st-box" style="${e.status===s?'background:#4A3524;':''}">&nbsp;</div>`; }

// ── FORNECEDORES (integração com Terceirizados) ──────────────────────────────
const _MESES_LABEL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function renderServicoEtapaSelect(ei, etapaId, fornecedor, valorAtual){
  const tercs = loadTerceirizados();
  const primeiroNome = (fornecedor||'').toLowerCase().split(' ')[0];
  const terc = primeiroNome ? tercs.find(t => t.nome && t.nome.toLowerCase().includes(primeiroNome)) : null;
  const servicos = terc ? (terc.servicos||[]).filter(s=>s.etapa_id===etapaId) : [];
  if(servicos.length <= 1) {
    // Zero ou um serviço: sem necessidade de select
    if(servicos.length===1 && !valorAtual) {
      // Auto-preencher se só há um
      setTimeout(()=> ei===-1 ? salvarTalh('servico',servicos[0].desc||'') : salvarEtapa(ei,'servico',servicos[0].desc||''), 0);
    }
    const desc = servicos.length===1 ? (servicos[0].desc ? servicos[0].desc+' — R$ '+(servicos[0].valor*(servicos[0].pares||1)).toFixed(2).replace('.',',')+'/pç' : 'R$ '+(servicos[0].valor*(servicos[0].pares||1)).toFixed(2).replace('.',',')+'/pç') : '';
    return desc ? `<div style="padding:8px 11px;border:1.5px solid var(--gn2);border-radius:var(--r-sm);font-size:12px;color:var(--ch2);background:var(--gn2)">${desc}</div>` : `<div style="padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-size:12px;color:var(--fe);font-style:italic">— definido pelo fornecedor —</div>`;
  }
  // Múltiplos serviços: mostrar select
  const stl = 'padding:8px 11px;border:1.5px solid var(--am);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);background:var(--am2);width:100%';
  const opts = servicos.map(s=>{
    const label = (s.desc||'Padrão')+' — R$ '+(s.valor*(s.pares||1)).toFixed(2).replace('.',',')+'/pç';
    const sel = valorAtual===(s.desc||'') ? ' selected' : '';
    return `<option value="${s.desc||''}"${sel}>${label}</option>`;
  }).join('');
  const saveCmd = ei===-1 ? `salvarTalh('servico',this.value)` : `salvarEtapa(${ei},'servico',this.value)`;
  return `<select onchange="${saveCmd}" style="${stl}">`
    +`<option value="">⚠ Selecionar serviço</option>`+opts+`</select>`;
}

function renderMesEtapaSelect(ei, selecionado){
  const saveCmd = ei===-1 ? `salvarTalh('mes_fechamento',this.value)` : `salvarEtapa(${ei},'mes_fechamento',this.value)`;
  const stl = 'padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);background:var(--wh);width:100%';
  return `<select onchange="${saveCmd}" style="${stl}">`
    + `<option value="">— Selecionar —</option>`
    + renderMesesOpts(selecionado)
    + `</select>`;
}

function renderMesesOpts(selecionado){
  const hoje = new Date(); const opts = [];
  for(let i=-2;i<=4;i++){
    const d = new Date(hoje.getFullYear(), hoje.getMonth()+i, 1);
    const val = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl = _MESES_LABEL[d.getMonth()]+' '+d.getFullYear();
    opts.push('<option value="'+val+'"'+(selecionado===val?' selected':'')+'>'+lbl+'</option>');
  }
  return opts.join('');
}
function loadTerceirizados(){
  try{ return _lsGet('ci_terceirizados', []); }catch(e){ return []; }
}

function renderFornecedorSelectTalh(valorAtual){
  const tercs = loadTerceirizados();
  const filtrados = tercs.filter(t=>(t.servicos||[]).some(s=>s.etapa_id==='talh'));
  const lista = filtrados.length > 0 ? filtrados : tercs;
  const opts = lista.map(t=>{
    const sel = valorAtual===t.nome ? ' selected' : '';
    return `<option value="${t.nome}"${sel}>${t.nome}</option>`;
  }).join('');
  const stl = 'padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);background:var(--wh);width:100%';
  return `<select onchange="onTalhFornChange(this.value)" style="${stl}">`
    +`<option value="">— Selecionar —</option>`+opts
    +`<option value="__outro__"${valorAtual&&!lista.find(t=>t.nome===valorAtual)?' selected':''}>Outro (digitar)</option>`
    +`</select>`
    +`<input type="text" id="talh-forn-txt"`
    +` style="margin-top:4px;display:${valorAtual&&!lista.find(t=>t.nome===valorAtual)?'block':'none'};padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);width:100%"`
    +` value="${valorAtual&&!lista.find(t=>t.nome===valorAtual)?valorAtual:''}" placeholder="Nome do responsável"`
    +` oninput="salvarTalh('fornecedor',this.value)"/>`;
}

function onTalhFornChange(val){
  const txt = document.getElementById('talh-forn-txt');
  if(val==='__outro__'){ if(txt) txt.style.display='block'; salvarTalh('fornecedor',''); return; }
  if(txt) txt.style.display='none';
  salvarTalh('fornecedor',val);
  // Atualizar select de serviço
  const sw = document.getElementById('talh-serv-wrap');
  if(sw && ordemAtiva!==null){
    const o = ordens[ordemAtiva];
    sw.innerHTML = renderServicoEtapaSelect(-1,'talh',val,o.talh&&o.talh.servico||'');
  }
}
function renderFornecedorSelect(ei, etapaId, valorAtual){
  const tercs = loadTerceirizados();
  const tercsFiltrados = tercs.filter(t => (t.servicos||[]).some(s => s.etapa_id === etapaId));
  // Se não houver nenhum cadastrado para a etapa, mostra todos
  const lista = tercsFiltrados.length > 0 ? tercsFiltrados : tercs;
  const opts = lista.map(t => {
    const sel = valorAtual===t.nome ? ' selected' : '';
    return `<option value="${t.nome}"${sel}>${t.nome}</option>`;
  }).join('');
  const temOutro = valorAtual && !lista.find(t=>t.nome===valorAtual);
  const outroSel = temOutro ? ' selected' : '';
  const txtDisplay = temOutro ? 'block' : 'none';
  const txtVal = temOutro ? (valorAtual||'') : '';
  const stl = 'padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);background:var(--wh);width:100%';
  return `<select id="forn-sel-${ei}" onchange="onFornecedorChange(${ei},'${etapaId}',this.value)" style="${stl}">`
    + `<option value="">— Selecionar fornecedor —</option>`
    + opts
    + `<option value="__outro__"${outroSel}>Outro (digitar)</option>`
    + `</select>`
    + `<input type="text" id="forn-txt-${ei}"`
    + ` style="margin-top:4px;display:${txtDisplay};padding:8px 11px;border:1.5px solid var(--fe2);border-radius:var(--r-sm);font-family:Poppins,sans-serif;font-size:12px;color:var(--ch);width:100%"`
    + ` value="${txtVal}" placeholder="Nome do fornecedor"`
    + ` oninput="salvarEtapa(${ei},'fornecedor',this.value)"/>`;
}
function onFornecedorChange(ei, etapaId, val){
  const txtEl = document.getElementById('forn-txt-'+ei);
  if(val==='__outro__'){
    if(txtEl){ txtEl.style.display='block'; txtEl.focus(); }
    salvarEtapa(ei,'fornecedor','');
    return;
  }
  if(txtEl) txtEl.style.display='none';
  salvarEtapa(ei,'fornecedor',val);
  // Recarregar select de serviço para o novo fornecedor
  const sw = document.getElementById('serv-wrap-'+ei);
  if(sw){ const et=ordens[ordemAtiva].etapas[ei]; sw.innerHTML=renderServicoEtapaSelect(ei,et.id,val,et.servico||''); }
  if(!val) return;
  const tercs = loadTerceirizados();
  const terc = tercs.find(t=>t.nome===val);
  if(!terc) return;
  // Buscar serviço cadastrado para esta etapa
  const servicos = (terc.servicos||[]).filter(s=>s.etapa_id===etapaId);
  if(!servicos.length) return;
  // Se há um único serviço, preenche automaticamente
  // Se há múltiplos, preenche com o primeiro e será ajustado no fechamento
  const serv = servicos[0];
  const descServ = serv.desc || '';
  salvarEtapa(ei,'servico',descServ);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  renderLista();
  if(ordens.length > 0){ ordemAtiva=0; renderLista(); renderForm(); }
});
</script>
